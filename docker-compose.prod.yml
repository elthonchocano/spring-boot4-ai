services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-prod
    volumes:
      - ${OLLAMA_MODELS_PATH}/:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull mistral:7b && tail -f /dev/null"
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: news-summary-api:1.0.0
    container_name: news-summary-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DOCKER_COMPOSE_ENABLED=false # Disable auto-management in prod
      - OLLAMA_URL=http://ollama-prod:11434
    depends_on:
      - ollama