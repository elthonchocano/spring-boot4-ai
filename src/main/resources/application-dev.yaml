spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s # Wait up to 30s for AI to finish

  threads:
    virtual:
      enabled: true # Crucial for non-blocking AI calls

  # Docker Compose Support
  docker:
    compose:
      enabled: true
      file: docker-compose.yml
      lifecycle-management: start-only # Keeps Ollama running between app restarts

  ai:
    ollama:
      # base-url is AUTOMATICALLY injected by spring-boot-docker-compose
      chat:
        options:
          model: mistral:7b
          temperature: 0.7

  cache:
    caffeine:
      spec: expireAfterWrite=5m,maximumSize=100

management:
  tracing:
    sampling:
      probability: 1.0 # Capture 100% of requests
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  observations:
    key-values:
      application: ${spring.application.name}

  # Disable OTLP exporters for local development
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false
    logging:
      export:
        enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

server:
  shutdown: graceful # Allows active requests to finish before stopping