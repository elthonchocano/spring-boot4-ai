spring:
  test:
    observability:
      auto-configure: true
  jackson:
    serialization:
      fail-on-empty-beans: false
    datetime:
      dates-as-timestamps: false

management:
  # Disable OTLP exporters for local development
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false
    logging:
      export:
        enabled: false

api:
  news-api:
    key: 123456
    url:
      base: https://newsapi.org/v2
      content: /top-headlines
  ollama:
    url:
      base: http://localhost:11434
      generate: /api/generate
      body:
        model: mistral:7b

prompt: Test Prompt
